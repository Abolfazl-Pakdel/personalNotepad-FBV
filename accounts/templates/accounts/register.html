{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <div class="card shadow rounded-4">

        <div class="card-body">

            <h2 class="text-center mb-4">
                📝 Register
            </h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-success w-100">
                    Register
                </button>

            </form>

            <hr>

            <p class="text-center">

                Already have an account?

                <a href="{% url 'accounts:login' %}">
                    Login
                </a>

            </p>

        </div>

    </div>

</div>

{% endblock %}
