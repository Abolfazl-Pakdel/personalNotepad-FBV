{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}My Notes{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Vazirmatn -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: Vazirmatn, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: #fff;
        }

        .glass {
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,.1);
            box-shadow: 0 8px 25px rgba(0,0,0,.35);
        }

        .navbar-custom{
            background: rgba(15,23,42,.8);
            backdrop-filter: blur(15px);
        }

        .card-note{
            transition:.3s;
        }

        .card-note:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 25px rgba(0,0,0,.4);
        }

        .btn-primary{
            border-radius:12px;
        }

        textarea{
            resize:none;
        }

        footer{
            color:#b9c3d4;
        }

    </style>

    {% block extra_css %}

    {% endblock %}

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-journal-richtext"></i>
            My Notes
        </a>

        <div class="ms-auto">

            {% if request.user.is_authenticated %}

                <span class="me-3">
                    <i class="bi bi-person-circle"></i>
                    {{request.user.username}}
                </span>

                <a href="{% url 'accounts:logout'  %}'" class="btn btn-outline-light btn-sm">
                    Logout
                </a>

            {% else %}

                <a href="{% url 'accounts:login' %}" class="btn btn-outline-light btn-sm me-2">
                    Login
                </a>

                <a href="{% url 'accounts:register' %}" class="btn btn-primary btn-sm">
                    Register
                </a>

            {% endif %}

        </div>

    </div>

</nav>

<div class="container py-5">

    {% block content %}

    {% endblock %}

</div>

<footer class="text-center py-4">

    Made with ❤️ using Django

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
