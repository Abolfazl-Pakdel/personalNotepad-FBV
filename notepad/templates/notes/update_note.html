{% extends "base.html" %}

{% block title %}
Edit Note
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:700px;">

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body">

            <h2 class="mb-4">
                ✏️ Edit Note
            </h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-success">
                        💾 Save Changes
                    </button>

                    <a href="{% url 'notepad:index' %}" class="btn btn-secondary">
                        Cancel
                    </a>

                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
